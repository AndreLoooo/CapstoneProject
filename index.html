<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app-container">
    <h1>Movie Finder App</h1>
    <p>Search for your movies and get it's info!</p>

    <div class="search box">
        <input type="text" id="movieInput" placeholder="Enter movie title here">
        <button id="searchBtn">Search</button>
    </div>

<section id="movieResult" class="movie-result">
    <p>Results will show up here!</p>
    </section>
    </main>


<script src="script.js"></script>

</body>
</html>
